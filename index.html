<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>GameLeaf Gryvery</title>
<style>
body {
  margin: 0;
  background: #000;
  font-family: Arial, sans-serif;
  color: #fff;
}

/* Container */
.carousel-container {
  position: relative;
  width: 100%;
  height: 260px;
  overflow: hidden;
}

/* Gruppo di video */
.carousel-group {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 15px;
  opacity: 0;
  transition: opacity 1s ease-in-out;
}

/* Video */
.carousel-group iframe {
  width: 360px;
  height: 202px;
  border-radius: 12px;
  border: 3px solid #00eaff;
  box-shadow: 0 0 15px #00eaff, 0 0 30px #00eaff;
}

/* Responsive */
@media (max-width: 900px) {
  .carousel-group iframe {
    width: 300px;
    height: 168px;
  }
}

@media (max-width: 700px) {
  .carousel-group {
    gap: 10px;
  }
  .carousel-group iframe {
    width: 240px;
    height: 135px;
  }
}

@media (max-width: 550px) {
  .carousel-group iframe {
    width: 90vw;
    height: calc(90vw * 0.56);
  }
}

/* Pulsanti */
.btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,255,255,0.2);
  border: none;
  color: #00eaff;
  font-size: 32px;
  padding: 10px 15px;
  cursor: pointer;
  border-radius: 8px;
  user-select: none;
  box-shadow: 0 0 10px #00eaff;
}

.btn:hover {
  background: rgba(0,255,255,0.4);
}

#prevBtn { left: 10px; }
#nextBtn { right: 10px; }
</style>
</head>
<body>

<div class="carousel-container">
  <button id="prevBtn" class="btn">❮</button>
  <button id="nextBtn" class="btn">❯</button>

  <div id="carousel"></div>
</div>

<script>
// Lista video
const VIDEO_IDS = [
  "AlKQqBHOvBA","dU3UEGASMRk","dftSDyemcS0","d_MNbdLEoQ8","gaYagaeZCEU",
  "68ymUufUaNs","5x53uG35EWI","2IEc3UXoTMc","k_dlmxP3ycs","A6Z9kWJfUf8",
  "LaQ-Y4pDi_4","Uw81F2CyJsM","EfEQmbSjdO8","P2BHmC6CB0I","gkyTk2JOopo",
  "759A49vvSpU","KL80h4dNRco","pKx2JWjLBVI","EPeN3hWaRBw","T2miE5DGOZY",
  "Y4MUJywQtlA","ZhXriEpQD1A","TeI4VvaRc74","634UEUVUzIM","LwRa2aCvhPM"
];

// Mescola casualmente
function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

const videos = shuffle(VIDEO_IDS);

// Dividi in gruppi da 3
const groups = [];
for (let i = 0; i < videos.length; i += 3) {
  groups.push(videos.slice(i, i + 3));
}

const carousel = document.getElementById("carousel");

// Genera i gruppi
groups.forEach(group => {
  const div = document.createElement("div");
  div.className = "carousel-group";

  group.forEach(id => {
    div.innerHTML += `<iframe src="https://www.youtube.com/embed/${id}"></iframe>`;
  });

  carousel.appendChild(div);
});

const cards = document.querySelectorAll(".carousel-group");
let index = 0;

function showGroup(i) {
  cards.forEach((c, n) => {
    c.style.opacity = n === i ? "1" : "0";
  });
}

showGroup(index);

// Pulsanti
document.getElementById("nextBtn").onclick = () => {
  index = (index + 1) % cards.length;
  showGroup(index);
};

document.getElementById("prevBtn").onclick = () => {
  index = (index - 1 + cards.length) % cards.length;
  showGroup(index);
};

// Scorrimento automatico
setInterval(() => {
  index = (index + 1) % cards.length;
  showGroup(index);
}, 5000);
</script>

</body>
</html>
