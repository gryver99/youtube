<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>GameLeaf Gryvery</title>
<style>
body {
  margin: 0;
  background: #000;
  font-family: Arial, sans-serif;
  color: #fff;
}

.carousel-container {
  position: relative;
  width: 100%;
  height: 220px;
  overflow: hidden;
}

.video-card {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0;
  transition: opacity 1s ease-in-out;
}

.video-card iframe {
  width: 360px;
  height: 202px;
  border-radius: 10px;
  border: none;
}

/* Pulsanti */
.btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.2);
  border: none;
  color: white;
  font-size: 30px;
  padding: 10px 15px;
  cursor: pointer;
  border-radius: 8px;
  user-select: none;
}

.btn:hover {
  background: rgba(255,255,255,0.4);
}

#prevBtn { left: 10px; }
#nextBtn { right: 10px; }
</style>
</head>
<body>

<div class="carousel-container">
  <button id="prevBtn" class="btn">❮</button>
  <button id="nextBtn" class="btn">❯</button>

  <div id="carousel"></div>
</div>

<script>
// Lista video
const VIDEO_IDS = [
  "AlKQqBHOvBA","dU3UEGASMRk","dftSDyemcS0","d_MNbdLEoQ8","gaYagaeZCEU",
  "68ymUufUaNs","5x53uG35EWI","2IEc3UXoTMc","k_dlmxP3ycs","A6Z9kWJfUf8",
  "LaQ-Y4pDi_4","Uw81F2CyJsM","EfEQmbSjdO8","P2BHmC6CB0I","gkyTk2JOopo",
  "759A49vvSpU","KL80h4dNRco","pKx2JWjLBVI","EPeN3hWaRBw","T2miE5DGOZY",
  "Y4MUJywQtlA","ZhXriEpQD1A","TeI4VvaRc74","634UEUVUzIM","LwRa2aCvhPM"
];

// Mescola casualmente
function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

const videos = shuffle(VIDEO_IDS);

const carousel = document.getElementById("carousel");

// Genera i video
videos.forEach(id => {
  const card = document.createElement("div");
  card.className = "video-card";
  card.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}"></iframe>`;
  carousel.appendChild(card);
});

const cards = document.querySelectorAll(".video-card");
let index = 0;

function showVideo(i) {
  cards.forEach((c, n) => {
    c.style.opacity = n === i ? "1" : "0";
  });
}

showVideo(index);

// Pulsanti
document.getElementById("nextBtn").onclick = () => {
  index = (index + 1) % cards.length;
  showVideo(index);
};

document.getElementById("prevBtn").onclick = () => {
  index = (index - 1 + cards.length) % cards.length;
  showVideo(index);
};

// Scorrimento automatico
setInterval(() => {
  index = (index + 1) % cards.length;
  showVideo(index);
}, 5000);
</script>

</body>
</html>

</script>

</body>
</html>
