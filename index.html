<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Carosello Video Casuali - Gryvery</title>
<style>
body {
  margin: 0;
  background: #000;
  font-family: Arial, sans-serif;
}
.carousel {
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
}
.carousel iframe {
  width: 360px;
  height: 202px;
  margin: 10px;
  border-radius: 10px;
  scroll-snap-align: center;
  border: none;
}
</style>
</head>
<body>

<div id="carousel" class="carousel"></div>

<script>
const CHANNEL_ID = "UC3qH1u3Qe9n2kGx0iJY9hwA"; // Gryvery
const MAX_VIDEOS = 10;

async function loadVideos() {
  const rssUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}`;
  const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`;

  const res = await fetch(proxy);
  const data = await res.json();

  const parser = new DOMParser();
  const xml = parser.parseFromString(data.contents, "text/xml");

  const entries = [...xml.querySelectorAll("entry")];
  const videos = entries.map(e => e.querySelector("yt\\:videoId").textContent);

  const random = videos.sort(() => Math.random() - 0.5).slice(0, MAX_VIDEOS);

  const container = document.getElementById("carousel");
  random.forEach(id => {
    const iframe = document.createElement("iframe");
    iframe.src = `https://www.youtube.com/embed/${id}`;
    container.appendChild(iframe);
  });
}

loadVideos();
</script>

</body>
</html>
